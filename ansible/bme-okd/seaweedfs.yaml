apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seaweedfs-volume-claim
  labels:
    app: seaweedfs
spec:
  storageClassName: rook-cephfs
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seaweedfs
  labels:
    app: seaweedfs
    app.kubernetes.io/part-of: gallery-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seaweedfs
  template:
    metadata:
      labels:
        app: seaweedfs
    spec:
      containers:
        - name: seaweedfs
          image: chrislusf/seaweedfs:latest
          command:
            - "weed"
            - "server"
            - "-dir=/data"
            - "-s3"
          ports:
            - containerPort: 9333
            - containerPort: 8080
            - containerPort: 8333
          volumeMounts:
            - mountPath: /data
              name: seaweedfsdata
          envFrom:
            - secretRef:
                name: gallery-secrets
      volumes:
        - name: seaweedfsdata
          persistentVolumeClaim:
            claimName: seaweedfs-volume-claim
---
apiVersion: v1
kind: Service
metadata:
  name: seaweedfs
  labels:
    app: seaweedfs
    app.kubernetes.io/part-of: gallery-app
spec:
  selector:
    app: seaweedfs
  ports:
    - name: master
      port: 9333
      targetPort: 9333
    - name: volume
      port: 8080
      targetPort: 8080
    - name: s3
      port: 8333
      targetPort: 8333
