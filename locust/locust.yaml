---
apiVersion: v1
kind: Service
metadata:
  name: locust
  labels:
    app: locust
spec:
  ports:
    - port: 8089
      targetPort: 8089
      name: web-ui
  selector:
    app: locust
    
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust
spec:
  selector:
    matchLabels:
      app: locust
  replicas: 1
  template:
    metadata:
      labels:
        app: locust
    spec:
      containers:
        - name: locust
          image: kisbogdan/gallery-locust:latest
          args: ["-f", "/mnt/locust/locustfile.py"]
          ports:
            - containerPort: 8089
              name: web-ui
